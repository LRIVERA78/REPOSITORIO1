<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba Static Web App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }
    header {
      background: #0078D4;
      color: white;
      padding: 20px;
      text-align: center;
    }
    nav {
      background: #333;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .container {
      padding: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }
    .card-content {
      padding: 15px;
    }
    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
    button {
      padding: 10px 15px;
      background: #0078D4;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>

<header>
  <h1>Static Web App - Página de Prueba</h1>
  <p>Deploy exitoso 🚀</p>
</header>

<nav>
  <a href="#">Inicio</a>
  <a href="#">Servicios</a>
  <a href="#">Contacto</a>
</nav>

<div class="container">
  <h2>Galería de Imágenes</h2>
  <div class="grid">
    <div class="card">
      <img src="https://picsum.photos/400/200?random=1" alt="Imagen 1">
      <div class="card-content">
        <h3>Imagen 1</h3>
        <p>Descripción de prueba.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/200?random=2" alt="Imagen 2">
      <div class="card-content">
        <h3>Imagen 2</h3>
        <p>Descripción de prueba.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/400/200?random=3" alt="Imagen 3">
      <div class="card-content">
        <h3>Imagen 3</h3>
        <p>Descripción de prueba.</p>
      </div>
    </div>
  </div>

  <h2>Interacción</h2>
  <button onclick="mostrarMensaje()">Haz clic</button>
  <p id="mensaje"></p>
</div>

<footer>
  <p>© 2026 Static Web App Demo</p>
</footer>

<script>
  function mostrarMensaje() {
    document.getElementById('mensaje').innerText = '¡Funciona correctamente! 🎉';
  }
</script>

</body>
</html>
